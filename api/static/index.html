<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CamAiSearch Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; background: #0e1116; color: #e9eef5; margin: 0; }
    header { padding: 12px 18px; background: #151a22; border-bottom: 1px solid #273041; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 12px; padding: 12px; }
    .card { background: #151a22; border: 1px solid #273041; border-radius: 8px; padding: 8px; }
    .card h3 { margin: 0 0 8px 0; font-size: 14px; color: #6fe3ff; }
    img { width: 100%; border-radius: 6px; background: #05070b; }
    #alerts, #job-events { max-height: 300px; overflow: auto; }
    .alert { border-left: 4px solid #ff7d7d; background: #1f1820; margin-bottom: 6px; padding: 8px; }
    .sev-info { border-left-color: #6fe3ff; }
    .sev-medium { border-left-color: #f7cc67; }
    .sev-high { border-left-color: #ff8d5f; }
    .sev-critical { border-left-color: #ff4f4f; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    input, button { background: #111722; color: #e9eef5; border: 1px solid #2a3446; border-radius: 6px; padding: 7px; }
    button { cursor: pointer; }
    .meta { color: #9fb0c9; font-size: 12px; }
    progress { width: 100%; height: 16px; }
  </style>
</head>
<body>
  <header><strong>CamAiSearch</strong> · Dashboard en vivo</header>
  <div class="grid">
    <div class="card">
      <h3>Procesar video (upload)</h3>
      <form id="analyze-form">
        <div class="row">
          <input id="video-file" type="file" accept="video/*" required />
          <input id="camera-id" type="text" placeholder="camera_id (opcional)" />
          <input id="max-seconds" type="number" min="1" max="7200" placeholder="max segundos (opcional)" />
          <label class="meta"><input id="save-clips" type="checkbox" checked /> guardar clips</label>
          <button type="submit">Subir y analizar</button>
        </div>
      </form>
      <p id="job-status" class="meta">Sin trabajo activo.</p>
      <progress id="job-progress" value="0" max="100"></progress>
      <h3 style="margin-top: 10px;">Eventos del video en proceso</h3>
      <div id="job-events"></div>
    </div>
    <div class="card">
      <h3>Cámaras</h3>
      <div id="camera-grid" class="grid"></div>
    </div>
    <div class="card">
      <h3>Alertas y eventos en vivo</h3>
      <div id="alerts"></div>
    </div>
  </div>

  <script>
    let currentJobId = null;
    let currentJobCameraId = null;
    let jobPollHandle = null;

    async function loadCameras() {
      const res = await fetch('/cameras');
      const cameras = await res.json();
      const grid = document.getElementById('camera-grid');
      grid.innerHTML = '';
      cameras.forEach(cam => {
        const wrapper = document.createElement('div');
        wrapper.className = 'card';
        wrapper.innerHTML = `<h3>${cam.name} (${cam.camera_id})</h3><img src="/stream/${cam.camera_id}" alt="${cam.camera_id}" />`;
        grid.appendChild(wrapper);
      });
    }

    function appendAlert(containerId, event) {
      const container = document.getElementById(containerId);
      const div = document.createElement('div');
      div.className = `alert sev-${event.severity}`;
      div.innerHTML = `<strong>${event.event_type}</strong> · ${event.camera_id}<br/>${event.description}`;
      container.prepend(div);
    }

    function connectEvents() {
      const wsProtocol = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${wsProtocol}://${location.host}/ws/live-events`);
      ws.onmessage = (message) => {
        const event = JSON.parse(message.data);
        appendAlert('alerts', event);
      };
      ws.onclose = () => setTimeout(connectEvents, 1500);
    }

    function setJobStatus(text, progressValue = null) {
      document.getElementById('job-status').textContent = text;
      if (progressValue !== null) {
        document.getElementById('job-progress').value = progressValue;
      }
    }

    async function fetchCameraEvents(cameraId) {
      if (!cameraId) {
        return;
      }
      const res = await fetch(`/events?limit=20&camera_id=${encodeURIComponent(cameraId)}`);
      if (!res.ok) {
        return;
      }
      const events = await res.json();
      const list = document.getElementById('job-events');
      list.innerHTML = '';
      events.forEach((event) => appendAlert('job-events', event));
    }

    async function pollJobStatus() {
      if (!currentJobId) {
        return;
      }
      const res = await fetch(`/analyze-jobs/${currentJobId}`);
      if (!res.ok) {
        setJobStatus('No se pudo leer el estado del trabajo.');
        clearInterval(jobPollHandle);
        jobPollHandle = null;
        return;
      }
      const job = await res.json();
      const progress = typeof job.progress_percent === 'number' ? job.progress_percent : 0;
      setJobStatus(
        `Estado: ${job.status} · frames: ${job.processed_frames} · eventos: ${job.events_detected} · clips: ${job.clips_generated}`,
        progress
      );
      await fetchCameraEvents(currentJobCameraId);
      if (job.status === 'completed' || job.status === 'failed') {
        clearInterval(jobPollHandle);
        jobPollHandle = null;
      }
    }

    async function submitAnalyzeForm(event) {
      event.preventDefault();
      const fileInput = document.getElementById('video-file');
      const file = fileInput.files[0];
      if (!file) {
        setJobStatus('Selecciona un video antes de enviar.');
        return;
      }
      const cameraIdInput = document.getElementById('camera-id').value.trim();
      const maxSecondsRaw = document.getElementById('max-seconds').value.trim();
      const saveClips = document.getElementById('save-clips').checked;
      const cameraId = cameraIdInput || `upload_${Date.now()}`;
      const maxSeconds = maxSecondsRaw ? parseInt(maxSecondsRaw, 10) : null;

      setJobStatus('Subiendo archivo...', 0);
      const formData = new FormData();
      formData.append('file', file);
      const uploadRes = await fetch('/upload-video', { method: 'POST', body: formData });
      if (!uploadRes.ok) {
        const err = await uploadRes.text();
        setJobStatus(`Error subiendo video: ${err}`);
        return;
      }
      const uploadData = await uploadRes.json();

      setJobStatus('Lanzando análisis...', 0);
      const analyzeRes = await fetch('/analyze-async', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source: uploadData.path,
          camera_id: cameraId,
          max_seconds: maxSeconds,
          save_clips: saveClips
        })
      });
      if (!analyzeRes.ok) {
        const err = await analyzeRes.text();
        setJobStatus(`Error iniciando análisis: ${err}`);
        return;
      }
      const job = await analyzeRes.json();
      currentJobId = job.job_id;
      currentJobCameraId = cameraId;
      setJobStatus(`Job creado: ${currentJobId}`, 0);
      if (jobPollHandle) {
        clearInterval(jobPollHandle);
      }
      await fetchCameraEvents(currentJobCameraId);
      jobPollHandle = setInterval(pollJobStatus, 2000);
      await pollJobStatus();
    }

    document.getElementById('analyze-form').addEventListener('submit', submitAnalyzeForm);
    loadCameras();
    connectEvents();
  </script>
</body>
</html>
